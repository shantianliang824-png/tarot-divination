<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>塔罗牌占卜</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container">
  <div class="top-ornament">✦ ✦ ✦ ✦ ✦</div>

  <header>
    <div class="star">✦ ✦ ✦ ✦ ✦ ✦ ✦</div>
    <h1>✦ 塔罗占卜 <span class="dot">·</span></h1>
    <p>Tarot Divination</p>
    <div class="divider-line"><span></span>✦<span></span></div>
  </header>

  <div class="spread-selector">
    <button class="spread-btn active" data-spread="single" onclick="selectSpread('single')">单张占卜<span class="sub">Daily</span></button>
    <button class="spread-btn" data-spread="three" onclick="selectSpread('three')">三张牌阵<span class="sub">Past·Now·Future</span></button>
    <button class="spread-btn" data-spread="celtic" onclick="selectSpread('celtic')">凯尔特十字<span class="sub">Celtic Cross</span></button>
    <button class="spread-btn" data-spread="love" onclick="selectSpread('love')">爱情牌阵<span class="sub">Love</span></button>
    <button class="spread-btn" data-spread="career" onclick="selectSpread('career')">事业牌阵<span class="sub">Career</span></button>
  </div>

  <div class="spread-desc" id="spread-desc"></div>

  <div class="draw-area">
    <button class="draw-btn" onclick="performReading()"><span class="icon">✦</span><span class="label">开始占卜</span></button>
  </div>

  <div class="cards-area">
    <div class="cards-grid" id="cards-grid"></div>
  </div>

  <div class="reading-result" id="reading-result">
    <h3>✦ 占卜解读 ✦</h3>
    <div id="reading-content"></div>
    <div class="reading-summary" id="reading-summary"></div>
  </div>

  <div class="history-section">
    <h3>占卜记录</h3>
    <div id="history-list"></div>
    <button class="clear-history-btn" onclick="clearHistory()">清空记录</button>
  </div>

  <footer><div class="ornament">✦ ✦ ✦ ✦ ✦</div>遵循内心，牌面自明</footer>
</div>

<div class="modal-overlay" id="card-modal" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modal-body"></div>
</div>

<script src="js/cards-data.js"></script>
<script src="js/app.js"></script>
</body>
</html>
